name: RH IA - CI/CD

on:
  push:
    branches: [main]
    paths:
      - "rh-ia-backend/**"
      - "rh-ia-frontend/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "rh-ia-backend/**"
      - "rh-ia-frontend/**"
      - ".github/workflows/deploy.yml"

jobs:
  backend:
    name: Backend (rh-ia-backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rh-ia-backend
    env:
      # Banco fictício só para `prisma generate`/typecheck — nenhuma migração
      # real é aplicada neste workflow.
      DATABASE_URL: "postgresql://user:password@localhost:5432/rh_ia?schema=public"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rh-ia-backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Rodar testes (se existirem)
        run: npm run test --if-present

      - name: Build
        run: npm run build

  frontend:
    name: Frontend (rh-ia-frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rh-ia-frontend
    env:
      NEXT_PUBLIC_API_URL: "http://localhost:3001/api/v1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rh-ia-frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Rodar testes (se existirem)
        run: npm run test --if-present

      - name: Build
        run: npm run build

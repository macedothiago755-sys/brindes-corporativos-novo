# Orquestração local do módulo RH IA (backend + frontend + Postgres),
# útil para simular o ambiente de produção com um único comando:
#   docker compose up --build
#
# Nenhuma credencial real está fixada aqui — todos os valores sensíveis vêm
# de variáveis de ambiente (definidas em um arquivo `.env` na raiz, que NÃO
# deve ser commitado).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rh_ia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rh_ia}
    volumes:
      - rh_ia_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rh_ia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rh-ia-backend:
    build:
      context: ./rh-ia-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-rh_ia}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rh_ia}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_GRAPH_VERSION: ${WHATSAPP_GRAPH_VERSION:-v21.0}
    ports:
      - "3001:3001"

  rh-ia-frontend:
    build:
      context: ./rh-ia-frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    restart: unless-stopped
    depends_on:
      - rh-ia-backend
    ports:
      - "3000:3000"

volumes:
  rh_ia_db_data:
